# netlify.toml — Place this in your site root for optimized builds
[build]
  publish = "."

[build.environment]
  NODE_VERSION = "22"

# Headers for performance & security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback (for single-page sites)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
