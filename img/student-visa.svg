<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#B8E4F0"/>
      <stop offset="100%" stop-color="#E8F4F8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8b830"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="660" cy="90" r="50" fill="#FFD700" opacity="0.6"/>
  <circle cx="660" cy="90" r="35" fill="#FFF3B0" opacity="0.8"/>

  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="60" ry="20" fill="white" opacity="0.7"/>
  <ellipse cx="180" cy="70" rx="40" ry="18" fill="white" opacity="0.5"/>
  <ellipse cx="550" cy="120" rx="50" ry="16" fill="white" opacity="0.6"/>
  <ellipse cx="575" cy="112" rx="35" ry="14" fill="white" opacity="0.4"/>

  <!-- Ground / Grass -->
  <rect x="0" y="350" width="800" height="150" fill="#4CAF50" opacity="0.2"/>
  <rect x="0" y="370" width="800" height="130" fill="#388E3C" opacity="0.15"/>

  <!-- University Building -->
  <rect x="200" y="180" width="400" height="200" rx="8" fill="#0b3d66" opacity="0.9"/>
  <rect x="220" y="200" width="360" height="170" rx="4" fill="rgba(255,255,255,0.08)"/>

  <!-- Building roof / pediment -->
  <rect x="190" y="170" width="420" height="20" rx="4" fill="#072a48"/>
  <polygon points="380,130 420,130 440,170 360,170" fill="#072a48"/>

  <!-- Columns -->
  <rect x="250" y="210" width="18" height="150" rx="3" fill="rgba(232,184,48,0.4)"/>
  <rect x="320" y="210" width="18" height="150" rx="3" fill="rgba(232,184,48,0.4)"/>
  <rect x="462" y="210" width="18" height="150" rx="3" fill="rgba(232,184,48,0.4)"/>
  <rect x="532" y="210" width="18" height="150" rx="3" fill="rgba(232,184,48,0.4)"/>

  <!-- Door -->
  <rect x="360" y="280" width="80" height="90" rx="4" fill="rgba(0,0,0,0.4)"/>
  <rect x="370" y="290" width="60" height="75" rx="2" fill="rgba(232,184,48,0.15)"/>

  <!-- Windows -->
  <rect x="275" y="230" width="35" height="45" rx="3" fill="rgba(135,206,235,0.4)"/>
  <rect x="352" y="230" width="35" height="45" rx="3" fill="rgba(135,206,235,0.4)"/>
  <rect x="434" y="230" width="35" height="45" rx="3" fill="rgba(135,206,235,0.4)"/>
  <rect x="510" y="230" width="35" height="45" rx="3" fill="rgba(135,206,235,0.4)"/>
  <!-- Window crosses -->
  <line x1="292" y1="230" x2="292" y2="275" stroke="rgba(11,61,102,0.3)" stroke-width="2"/>
  <line x1="275" y1="252" x2="310" y2="252" stroke="rgba(11,61,102,0.3)" stroke-width="2"/>
  <line x1="369" y1="230" x2="369" y2="275" stroke="rgba(11,61,102,0.3)" stroke-width="2"/>
  <line x1="352" y1="252" x2="387" y2="252" stroke="rgba(11,61,102,0.3)" stroke-width="2"/>
  <line x1="451" y1="230" x2="451" y2="275" stroke="rgba(11,61,102,0.3)" stroke-width="2"/>
  <line x1="434" y1="252" x2="469" y2="252" stroke="rgba(11,61,102,0.3)" stroke-width="2"/>
  <line x1="527" y1="230" x2="527" y2="275" stroke="rgba(11,61,102,0.3)" stroke-width="2"/>
  <line x1="510" y1="252" x2="545" y2="252" stroke="rgba(11,61,102,0.3)" stroke-width="2"/>

  <!-- Sign on building -->
  <rect x="340" y="155" width="120" height="20" rx="4" fill="rgba(232,184,48,0.9)"/>
  <text x="400" y="169" text-anchor="middle" font-size="11" font-weight="800" fill="#072a48" font-family="Arial, sans-serif">UNIVERSITY</text>

  <!-- Graduation cap -->
  <g transform="translate(390, 118)">
    <polygon points="0,14 60,0 60,14 30,24" fill="url(#gold)" opacity="0.9"/>
    <rect x="58" y="10" width="4" height="20" rx="2" fill="#c8963e"/>
    <circle cx="60" cy="8" r="4" fill="#c8963e"/>
    <line x1="60" y1="8" x2="68" y2="5" stroke="#ffe082" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Walking Path -->
  <rect x="300" y="380" width="200" height="8" rx="2" fill="rgba(0,0,0,0.08)"/>
  <ellipse cx="400" cy="384" rx="100" ry="4" fill="rgba(0,0,0,0.05)"/>

  <!-- Student 1 (left) -->
  <g transform="translate(280, 340)">
    <!-- Body -->
    <rect x="8" y="18" width="18" height="28" rx="4" fill="#1565C0"/>
    <!-- Head -->
    <circle cx="17" cy="10" r="10" fill="#F0C878"/>
    <!-- Hair -->
    <ellipse cx="17" cy="4" rx="9" ry="5" fill="#3E2723"/>
    <!-- Legs -->
    <rect x="9" y="46" width="7" height="14" rx="2" fill="#263238"/>
    <rect x="19" y="46" width="7" height="14" rx="2" fill="#263238"/>
    <!-- Arms -->
    <line x1="6" y1="22" x2="-2" y2="34" stroke="#F0C878" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="22" x2="36" y2="30" stroke="#F0C878" stroke-width="3" stroke-linecap="round"/>
    <!-- Book -->
    <rect x="34" y="26" width="12" height="16" rx="2" fill="#e8b830" opacity="0.8"/>
    <line x1="40" y1="26" x2="40" y2="42" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <!-- Backpack -->
    <rect x="24" y="20" width="8" height="14" rx="2" fill="#ff7b00" opacity="0.7"/>
  </g>

  <!-- Student 2 (middle, female) -->
  <g transform="translate(370, 338)">
    <!-- Body / dress -->
    <rect x="8" y="20" width="18" height="30" rx="6" fill="#7B1FA2"/>
    <!-- Head -->
    <circle cx="17" cy="11" r="10" fill="#D4A85A"/>
    <!-- Hair -->
    <ellipse cx="17" cy="5" rx="10" ry="6" fill="#1A1A2E"/>
    <rect x="7" y="5" width="20" height="14" rx="8" fill="#1A1A2E"/>
    <!-- Legs -->
    <rect x="10" y="50" width="6" height="12" rx="2" fill="#D4A85A"/>
    <rect x="20" y="50" width="6" height="12" rx="2" fill="#D4A85A"/>
    <!-- Arms -->
    <line x1="6" y1="24" x2="-2" y2="36" stroke="#D4A85A" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="24" x2="36" y2="34" stroke="#D4A85A" stroke-width="3" stroke-linecap="round"/>
    <!-- Bag -->
    <rect x="34" y="28" width="14" height="12" rx="3" fill="#c8963e" opacity="0.7"/>
    <line x1="38" y1="24" x2="38" y2="28" stroke="#c8963e" stroke-width="2"/>
  </g>

  <!-- Student 3 (right, with suitcase) -->
  <g transform="translate(470, 335)">
    <!-- Body -->
    <rect x="6" y="20" width="18" height="26" rx="4" fill="#00897B"/>
    <!-- Head -->
    <circle cx="15" cy="11" r="10" fill="#E8C898"/>
    <!-- Hair -->
    <ellipse cx="15" cy="5" rx="9" ry="5" fill="#4E342E"/>
    <!-- Legs -->
    <rect x="7" y="46" width="7" height="14" rx="2" fill="#37474F"/>
    <rect x="17" y="46" width="7" height="14" rx="2" fill="#37474F"/>
    <!-- Arms -->
    <line x1="4" y1="24" x2="-4" y2="34" stroke="#E8C898" stroke-width="3" stroke-linecap="round"/>
    <line x1="26" y1="24" x2="30" y2="32" stroke="#E8C898" stroke-width="3" stroke-linecap="round"/>
    <!-- Suitcase -->
    <rect x="-18" y="30" width="14" height="22" rx="3" fill="#0b3d66"/>
    <rect x="-17" y="31" width="12" height="8" rx="1" fill="rgba(232,184,48,0.3)"/>
    <line x1="-14" y1="40" x2="-10" y2="40" stroke="rgba(232,184,48,0.4)" stroke-width="1.5"/>
    <line x1="-15" y1="43" x2="-11" y2="43" stroke="rgba(232,184,48,0.3)" stroke-width="1.5"/>
  </g>

  <!-- Trees -->
  <rect x="80" y="310" width="10" height="70" rx="3" fill="#795548"/>
  <circle cx="85" cy="295" r="35" fill="#2E7D32" opacity="0.7"/>
  <circle cx="70" cy="310" r="25" fill="#388E3C" opacity="0.6"/>
  <circle cx="100" cy="305" r="28" fill="#1B5E20" opacity="0.5"/>

  <rect x="690" y="315" width="10" height="65" rx="3" fill="#795548"/>
  <circle cx="695" cy="300" r="32" fill="#2E7D32" opacity="0.7"/>
  <circle cx="680" cy="315" r="22" fill="#388E3C" opacity="0.6"/>
  <circle cx="710" cy="310" r="25" fill="#1B5E20" opacity="0.5"/>

  <!-- Small flowers -->
  <circle cx="170" cy="375" r="4" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="620" cy="378" r="3" fill="#FFB74D" opacity="0.5"/>
  <circle cx="500" cy="370" r="3" fill="#E91E63" opacity="0.4"/>
  <circle cx="300" cy="378" r="3" fill="#FF8A65" opacity="0.4"/>

  <!-- Floating stars/sparkles -->
  <text x="120" y="180" font-size="20" fill="#e8b830" opacity="0.5">✦</text>
  <text x="650" y="250" font-size="16" fill="#e8b830" opacity="0.4">✦</text>
  <text x="400" y="90" font-size="14" fill="#e8b830" opacity="0.5">✦</text>
  <text x="250" y="150" font-size="12" fill="#e8b830" opacity="0.3">✦</text>
  <text x="550" y="200" font-size="12" fill="#e8b830" opacity="0.3">✦</text>

  <!-- Plane trail -->
  <line x1="100" y1="50" x2="300" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <polygon points="310,38 320,42 312,46" fill="rgba(255,255,255,0.3)"/>
</svg>
