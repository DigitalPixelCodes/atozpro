<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b3d66"/>
      <stop offset="100%" stop-color="#134e58"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8b830"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a6b5a"/>
      <stop offset="100%" stop-color="#0d3d35"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="500" fill="url(#bg)" opacity="0.9"/>

  <!-- Decorative circles -->
  <circle cx="680" cy="80" r="120" fill="rgba(232,184,48,0.06)"/>
  <circle cx="120" cy="420" r="90" fill="rgba(232,184,48,0.05)"/>
  <circle cx="400" cy="250" r="200" fill="rgba(26,107,90,0.15)"/>

  <!-- University building -->
  <rect x="260" y="160" width="280" height="220" rx="8" fill="url(#building)" opacity="0.9"/>
  <rect x="280" y="180" width="240" height="180" rx="4" fill="rgba(255,255,255,0.05)"/>

  <!-- Building columns -->
  <rect x="310" y="200" width="16" height="160" rx="2" fill="rgba(232,184,48,0.3)"/>
  <rect x="372" y="200" width="16" height="160" rx="2" fill="rgba(232,184,48,0.3)"/>
  <rect x="434" y="200" width="16" height="160" rx="2" fill="rgba(232,184,48,0.3)"/>

  <!-- Building entrance -->
  <rect x="355" y="280" width="90" height="80" rx="4" fill="rgba(0,0,0,0.3)"/>
  <rect x="365" y="290" width="70" height="60" rx="2" fill="rgba(232,184,48,0.15)"/>

  <!-- Dome / graduation cap icon on top -->
  <ellipse cx="400" cy="160" rx="50" ry="12" fill="rgba(232,184,48,0.4)"/>
  <rect x="390" y="130" width="20" height="30" rx="3" fill="rgba(232,184,48,0.5)"/>

  <!-- Graduation cap -->
  <g transform="translate(370, 108)">
    <polygon points="30,0 60,15 30,30 0,15" fill="url(#gold)" opacity="0.9"/>
    <rect x="28" y="0" width="4" height="12" rx="2" fill="#c8963e"/>
    <circle cx="30" cy="-2" r="4" fill="#c8963e"/>
    <line x1="60" y1="15" x2="68" y2="13" stroke="#c8963e" stroke-width="2"/>
  </g>

  <!-- Ground / campus -->
  <rect x="0" y="380" width="800" height="120" fill="rgba(0,0,0,0.15)"/>
  <rect x="0" y="380" width="800" height="4" fill="rgba(232,184,48,0.3)"/>

  <!-- Trees -->
  <circle cx="180" cy="360" r="30" fill="rgba(26,107,90,0.6)"/>
  <rect x="176" y="360" width="8" height="30" rx="2" fill="rgba(139,90,43,0.5)"/>
  <circle cx="620" cy="355" r="35" fill="rgba(26,107,90,0.5)"/>
  <rect x="616" y="355" width="8" height="35" rx="2" fill="rgba(139,90,43,0.5)"/>

  <!-- Students walking -->
  <!-- Student 1 -->
  <circle cx="300" cy="355" r="10" fill="#f0c878"/>
  <rect x="293" y="365" width="14" height="22" rx="3" fill="#1a5a8a"/>
  <line x1="293" y1="370" x2="285" y2="378" stroke="#f0c878" stroke-width="3" stroke-linecap="round"/>
  <line x1="307" y1="370" x2="315" y2="378" stroke="#f0c878" stroke-width="3" stroke-linecap="round"/>
  <!-- Backpack -->
  <rect x="305" y="366" width="8" height="12" rx="2" fill="#c8963e" opacity="0.7"/>

  <!-- Student 2 -->
  <circle cx="340" cy="352" r="10" fill="#d4a85a"/>
  <rect x="333" y="362" width="14" height="24" rx="3" fill="#0b3d66"/>
  <line x1="333" y1="368" x2="325" y2="376" stroke="#d4a85a" stroke-width="3" stroke-linecap="round"/>
  <line x1="347" y1="368" x2="355" y2="376" stroke="#d4a85a" stroke-width="3" stroke-linecap="round"/>
  <!-- Book in hand -->
  <rect x="355" y="370" width="10" height="14" rx="1" fill="rgba(232,184,48,0.6)"/>

  <!-- Student 3 -->
  <circle cx="500" cy="356" r="9" fill="#e8c898"/>
  <rect x="494" y="365" width="12" height="20" rx="3" fill="#134e58"/>
  <line x1="494" y1="370" x2="486" y2="377" stroke="#e8c898" stroke-width="3" stroke-linecap="round"/>
  <line x1="506" y1="370" x2="514" y2="377" stroke="#e8c898" stroke-width="3" stroke-linecap="round"/>

  <!-- Floating document / visa stamp -->
  <g transform="translate(580, 100) rotate(-8)">
    <rect x="0" y="0" width="120" height="160" rx="8" fill="rgba(255,255,255,0.95)"/>
    <rect x="15" y="20" width="90" height="6" rx="2" fill="#0b3d66" opacity="0.7"/>
    <rect x="15" y="34" width="70" height="4" rx="2" fill="#0b3d66" opacity="0.3"/>
    <rect x="15" y="44" width="80" height="4" rx="2" fill="#0b3d66" opacity="0.2"/>
    <rect x="15" y="54" width="60" height="4" rx="2" fill="#0b3d66" opacity="0.15"/>
    <!-- Passport photo placeholder -->
    <rect x="15" y="70" width="35" height="45" rx="3" fill="rgba(11,61,102,0.1)"/>
    <circle cx="32" cy="85" r="8" fill="rgba(11,61,102,0.15)"/>
    <rect x="58" y="72" width="45" height="4" rx="2" fill="#0b3d66" opacity="0.2"/>
    <rect x="58" y="82" width="35" height="4" rx="2" fill="#0b3d66" opacity="0.15"/>
    <rect x="58" y="92" width="40" height="4" rx="2" fill="#0b3d66" opacity="0.1"/>
    <!-- Stamp -->
    <circle cx="90" cy="130" r="18" fill="rgba(39,202,64,0.15)" stroke="rgba(39,202,64,0.5)" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="90" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="rgba(39,202,64,0.7)">OK</text>
  </g>

  <!-- UAE flag accent -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="6" height="60" rx="1" fill="#00732f"/>
    <rect x="6" y="0" width="6" height="60" rx="1" fill="#ffffff"/>
    <rect x="12" y="0" width="6" height="60" rx="1" fill="#000000"/>
    <rect x="0" y="0" width="24" height="20" rx="1" fill="#ff0000" opacity="0.8"/>
  </g>

  <!-- Decorative lines -->
  <line x1="0" y1="50" x2="200" y2="50" stroke="rgba(232,184,48,0.15)" stroke-width="1"/>
  <line x1="600" y1="450" x2="800" y2="450" stroke="rgba(232,184,48,0.15)" stroke-width="1"/>

  <!-- Small plane icon -->
  <g transform="translate(620, 60) scale(0.6)">
    <path d="M20 25 L40 15 L38 25 L55 22 L40 28 L40 35 L35 30 L30 38 L28 30 L20 33 L25 28 L10 30 L25 25Z" fill="rgba(232,184,48,0.4)"/>
  </g>

  <!-- Stars / sparkles -->
  <circle cx="150" cy="100" r="2" fill="rgba(232,184,48,0.5)"/>
  <circle cx="700" cy="200" r="2.5" fill="rgba(232,184,48,0.4)"/>
  <circle cx="250" cy="80" r="1.5" fill="rgba(232,184,48,0.6)"/>
  <circle cx="550" cy="400" r="2" fill="rgba(232,184,48,0.3)"/>
  <circle cx="680" cy="350" r="1.5" fill="rgba(232,184,48,0.5)"/>
</svg>
