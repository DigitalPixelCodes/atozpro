<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f4c75"/>
      <stop offset="100%" stop-color="#3282b8"/>
    </linearGradient>
    <linearGradient id="globe" x1="50" y1="40" x2="150" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="50%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <radialGradient id="glow" cx="100" cy="100" r="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Glow effect -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#glow)"/>
  <!-- Globe circle -->
  <circle cx="100" cy="100" r="58" fill="url(#globe)" opacity="0.9"/>
  <!-- Globe grid lines horizontal -->
  <ellipse cx="100" cy="100" rx="58" ry="24" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
  <ellipse cx="100" cy="100" rx="58" ry="12" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
  <!-- Globe grid vertical -->
  <ellipse cx="100" cy="100" rx="24" ry="58" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" transform="rotate(0 100 100)"/>
  <ellipse cx="100" cy="100" rx="12" ry="58" stroke="rgba(255,255,255,0.25)" stroke-width="1" fill="none" transform="rotate(0 100 100)"/>
  <!-- Continent shapes simplified -->
  <path d="M80 72 Q85 68 88 74 Q92 80 86 84 Q80 82 78 76 Z" fill="rgba(76,175,80,0.6)"/>
  <path d="M70 95 Q78 90 84 96 Q88 102 82 106 Q74 104 70 98 Z" fill="rgba(76,175,80,0.5)"/>
  <path d="M110 80 Q118 76 124 82 Q128 90 120 94 Q114 92 110 86 Z" fill="rgba(76,175,80,0.6)"/>
  <path d="M100 108 Q108 104 114 110 Q118 118 110 122 Q104 120 100 114 Z" fill="rgba(76,175,80,0.5)"/>
  <!-- Airplane flying around globe -->
  <g transform="translate(0, -5)">
    <!-- Trail line (dashed arc behind plane) -->
    <path d="M55 70 Q65 55 80 50" stroke="#f77f00" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>
    <path d="M50 80 Q58 62 72 54" stroke="#f77f00" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.3"/>
    <!-- Plane body -->
    <g transform="rotate(-25, 72, 58)">
      <path d="M52 62 L80 52 Q86 50 88 54 L78 58 L124 60 Q130 60 130 64 Q130 68 124 68 L78 72 L88 76 Q86 80 80 78 L52 68 Q48 67 48 65 Q48 63 52 62Z" fill="url(#plane-wing)"/>
    </g>
    <!-- Wing top -->
    <path d="M72 54 L82 40 Q84 38 88 40 L82 52Z" fill="#e65100" opacity="0.9"/>
    <!-- Wing bottom -->
    <path d="M72 68 L82 82 Q84 84 88 82 L82 70Z" fill="#e65100" opacity="0.9"/>
    <!-- Shine on globe -->
    <ellipse cx="78" cy="72" rx="20" ry="10" fill="white" opacity="0.08" transform="rotate(-15 78 72)"/>
  </g>
  <!-- Outer ring glow for neon feel -->
  <circle cx="100" cy="100" r="64" stroke="#4fc3f7" stroke-width="1.5" fill="none" opacity="0.25">
    <animate attributeName="r" values="62;66;62" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Pulse dots orbiting -->
  <circle cx="158" cy="100" r="3" fill="#4fc3f7" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="42" r="2.5" fill="#f77f00" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="120" r="2" fill="#69f0ae" opacity="0.5">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
