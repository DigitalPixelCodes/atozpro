<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f4c75"/>
      <stop offset="100%" stop-color="#3282b8"/>
    </linearGradient>
    <linearGradient id="plane" x1="40" y1="80" x2="160" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f77f00"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Subtle world/globe arc -->
  <circle cx="100" cy="110" r="55" stroke="rgba(255,255,255,0.08)" stroke-width="2" fill="none"/>
  <ellipse cx="100" cy="110" rx="55" ry="22" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" fill="none" transform="rotate(-20 100 110)"/>
  <!-- Airplane -->
  <g transform="translate(25, 25) scale(0.75)">
    <!-- Plane body -->
    <path d="M58 62 L100 48 Q108 45 108 52 L94 58 L160 60 Q168 60 168 66 Q168 72 160 72 L94 74 L108 80 Q108 87 100 84 L58 70 Q52 68 52 66 Q52 64 58 62Z" fill="url(#plane)"/>
    <!-- Wings top -->
    <path d="M78 58 L90 40 Q92 37 96 40 L88 56Z" fill="#f77f00" opacity="0.85"/>
    <!-- Wings bottom -->
    <path d="M78 76 L90 94 Q92 97 96 94 L88 78Z" fill="#f77f00" opacity="0.85"/>
    <!-- Trail dots -->
    <circle cx="42" cy="66" r="3" fill="url(#plane)" opacity="0.5"/>
    <circle cx="30" cy="66" r="2.2" fill="url(#plane)" opacity="0.3"/>
    <circle cx="20" cy="66" r="1.5" fill="url(#plane)" opacity="0.15"/>
  </g>
</svg>
